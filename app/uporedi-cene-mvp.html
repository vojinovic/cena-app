const results = document.getElementById('results');
const meta = document.getElementById('meta');
const input = document.getElementById('q');

function formatCena(c) {
  return c.toLocaleString('sr-RS', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function render(query) {
  const q = query.trim().toLowerCase();
  let matches = DATA;
  if (q.length > 0) {
    matches = DATA.filter(p => p[0].toLowerCase().includes(q) || p[1].toLowerCase().includes(q));
  }
  matches = matches.slice(0, 40);

  if (q.length > 0) {
    meta.textContent = matches.length + ' rezultata' + (matches.length === 40 ? ' (prikazano prvih 40)' : '');
  } else {
    meta.textContent = 'Ukucaj naziv proizvoda da pretražiš';
  }

  if (q.length === 0) {
    results.innerHTML = '<div class="empty">Počni da kucaš iznad ⬆</div>';
    return;
  }
  if (matches.length === 0) {
    results.innerHTML = '<div class="empty">Nema rezultata za "' + query + '"</div>';
    return;
  }

  results.innerHTML = matches.map(p => {
    const [naziv, brend, cene] = p;
    const best = cene[0];
    const worst = cene[cene.length - 1];
    const ustedaPct = worst[1] > 0 ? Math.round((worst[1] - best[1]) / worst[1] * 100) : 0;
    const prikazano = cene.slice(0, 4);
    const ostatak = cene.length - prikazano.length;

    const rowsHtml = prikazano.map((c, i) => {
      const cls = i === 0 ? 'best' : (i === cene.length - 1 && cene.length > 1 ? 'worst' : '');
      return '<div class="row ' + cls + '"><span class="store">' + c[0] + '</span><span class="price">' + formatCena(c[1]) + ' RSD</span></div>';
    }).join('');

    return '<div class="card">' +
      '<div class="card-head">' +
        '<div><div class="card-title">' + naziv + '</div><div class="card-brend">' + (brend || '') + '</div></div>' +
        '<div class="card-count">' + cene.length + ' prodavnica' + (ustedaPct > 0 ? '<br><span class="badge-save">−' + ustedaPct + '%</span>' : '') + '</div>' +
      '</div>' +
      '<div class="rows">' + rowsHtml + '</div>' +
      (ostatak > 0 ? '<div class="more-toggle">+' + ostatak + ' još...</div>' : '') +
    '</div>';
  }).join('');
}

input.addEventListener('input', e => render(e.target.value));
render('');
